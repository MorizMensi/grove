@switch (kind()) {
  @case ("html") {
    @if (mode() === "preview") {
      <!--
        SECURITY: sandbox MUST remain "allow-same-origin" without "allow-scripts".
        The combination allow-same-origin + allow-scripts disables the sandbox
        entirely (iframe can reach window.parent). Same-origin is required so
        the parent can inject the theme <style> into contentDocument. Scripts
        stay blocked, which is what actually prevents XSS here.
      -->
      <iframe
        #htmlFrame
        [src]="safeMediaUrl()"
        [title]="'HTML preview: ' + title()"
        class="html-iframe"
        sandbox="allow-same-origin"
        referrerpolicy="no-referrer"
        loading="lazy"
        (load)="onHtmlFrameLoad($event)"
      ></iframe>
    } @else {
      <md-node [markdown]="fencedSource()" />
    }
  }
  @case ("svg") {
    @if (mode() === "preview") {
      <img
        [src]="mediaUrl()"
        [alt]="title()"
        class="svg-bleed"
      />
    } @else {
      <md-node [markdown]="fencedSource()" />
    }
  }
  @case ("image") {
    <img
      [src]="mediaUrl()"
      [alt]="title()"
      class="media-preview"
    />
  }
  @case ("video") {
    <video
      [src]="mediaUrl()"
      controls
      class="media-preview"
    ></video>
  }
  @case ("audio") {
    <audio
      [src]="mediaUrl()"
      controls
      class="media-preview-audio"
    ></audio>
  }
  @case ("pdf") {
    <iframe
      [src]="safeMediaUrl()"
      [title]="'PDF preview: ' + title()"
      class="media-preview-pdf"
    ></iframe>
  }
  @default {
    @if (markdown() !== null) {
      <md-node [markdown]="markdown()!" />
    }
  }
}
