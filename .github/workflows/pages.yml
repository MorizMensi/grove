name: pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'frontend/**'
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/pages.yml'
      - '.github/workflows/build-wiki.yml'
  workflow_dispatch:

# Reusable workflow callers must grant at least the permissions the
# callee declares. build-wiki.yml needs pages: write + id-token: write
# to deploy via actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  wiki:
    uses: ./.github/workflows/build-wiki.yml
    with:
      docs: docs
      base-href: /grove/
